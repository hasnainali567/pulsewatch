name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Stage 1: CI - test the app and validate terraform syntax
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install app deps
        working-directory: app
        run: npm install
      - name: App syntax check
        working-directory: app
        run: npm test

      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt check
        working-directory: infra
        run: terraform fmt -check
      - name: Terraform init (no backend)
        working-directory: infra
        run: terraform init -backend=false
      - name: Terraform validate
        working-directory: infra
        run: terraform validate

  # Stage 2: Build AMI with Packer - only runs after tests pass,
  # and only on an actual push to main (not on PRs)
  build-ami:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - uses: hashicorp/setup-packer@main
      - name: Packer init
        working-directory: packer
        run: packer init pulsewatch.pkr.hcl
      - name: Packer build
        working-directory: packer
        run: packer build pulsewatch.pkr.hcl

  # Stage 3: Deploy infra with Terraform - only runs after the AMI
  # build succeeds, so Terraform always finds a fresh, tagged AMI
  terraform-deploy:
    needs: build-ami
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: terraform plan -out=tfplan
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
